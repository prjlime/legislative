<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>lime mainframe</title>
    <style>
        /* RESET AND WHITEOUT CONTAINER ARCHITECTURE */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #ffffff; /* Stark whiteout background */
            font-family: 'Courier New', Courier, monospace;
            color: #9bf00b; /* Core project lime green tint */
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            transition: background-color 0.5s ease;
        }

        /* FLOATING TERMINAL CONSOLE BOX */
        .tv-container {
            position: relative;
            width: 650px;
            height: 450px;
            box-sizing: border-box;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* RETRO SCREEN WORKSPACE INSET */
        .tv-screen {
            position: absolute;
            width: 100%;
            height: 100%;
            background-color: #0b0b0f;
            border-radius: 8px; /* Clean, modern edge profiling */
            overflow: hidden;
            display: flex;
            flex-direction: column;
            padding: 25px;
            box-sizing: border-box;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3), inset 0 0 30px rgba(0, 0, 0, 0.8);
        }

        /* Ambient scanline glow filter texture overlayed over terminal elements */
        .tv-screen::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.3) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.04), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.04));
            z-index: 10;
            background-size: 100% 4px, 6px 100%;
            pointer-events: none;
            opacity: 0.8;
        }

        /* Subtle matrix white noise/static background animation layer */
        .tv-static-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://w3.org id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            opacity: 0.03;
            z-index: 2;
            pointer-events: none;
            animation: staticNoise 0.15s steps(2) infinite;
        }

        @keyframes staticNoise {
            0% { transform: translate(0,0); }
            50% { transform: translate(-1%, 1%); }
            100% { transform: translate(1%, -1%); }
        }

        /* SCROLLABLE MONITOR LOG VIEWPORT */
        .output-display {
            flex: 1;
            overflow-y: auto;
            margin-bottom: 15px;
            padding-right: 5px;
            z-index: 5;
        }

        .log-entry {
            font-size: 0.85rem;
            line-height: 1.4;
            margin-bottom: 6px; /* Tightened up consecutive lines vertical margin padding */
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .system-prefix {
            color: #444444;
        }

        .accent-text {
            color: #ffffff;
        }

        .alert-text {
            color: #ff3333;
            text-shadow: 0 0 8px rgba(255, 51, 51, 0.4);
        }

        .gold-text {
            color: #ffd700;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
        }

        /* CLI INTERFACE WORK LINE */
        .input-line {
            display: flex;
            align-items: center;
            border-top: 1px dashed rgba(155, 240, 11, 0.15);
            padding-top: 12px;
            z-index: 5;
        }

        .prompt-symbol {
            font-size: 0.9rem;
            margin-right: 4px; /* Shrunk spacing margin down for tightly bonded string */
            user-select: none;
        }

        #terminalPrompt {
            flex: 1;
            background: transparent;
            border: none;
            color: #ffffff;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.9rem;
            outline: none;
            caret-color: #9bf00b;
            padding: 0;
            margin: 0;
        }

        /* SYSTEM SCREEN OVERRIDES (MODIFICATIONS) */
        .friends-theme .tv-screen {
            background-color: #1e112a; /* Monica's room violet theme tint */
            color: #f7ca18;
        }
        .friends-theme #terminalPrompt {
            caret-color: #f7ca18;
        }

        .glitch-flash .tv-screen {
            animation: screenVibe 0.2s steps(2) 2;
        }

        @keyframes screenVibe {
            0% { background-color: #ff3333; transform: scale(1.02); }
            50% { background-color: #ffffff; transform: scale(0.98); }
            100% { background-color: #0b0b0f; }
        }

        /* Custom Scrollbar configuration hidden specs */
        .output-display::-webkit-scrollbar { width: 4px; }
        .output-display::-webkit-scrollbar-track { background: transparent; }
        .output-display::-webkit-scrollbar-thumb { background: rgba(155, 240, 11, 0.15); border-radius: 2px; }
    </style>
</head>
<body>

    <!-- MAIN CENTERING CONTAINER WRAPPER -->
    <div class="tv-container" id="chassisWrapper">
        
        <!-- CRT GRID INTERFACE SCREEN BOX -->
        <div class="tv-screen">
            
            <!-- Animated subtle screen fuzz filter tracking -->
            <div class="tv-static-layer"></div>

            <!-- LOG OUTPUT PANEL CONTAINER -->
            <div class="output-display" id="outputDisplay">
                <div class="log-entry"><span class="system-prefix">MAIN_BOOT:</span>Channel transmission online. Type <span class="accent-text">help</span> for guidelines. Awaiting user input string...</div>
            </div>

            <!-- TERMINAL INPUT FORM PROMPT LINE -->
            <div class="input-line">
                <span class="prompt-symbol" id="promptSymbol">SYS:&gt;</span>
                <input type="text" id="terminalPrompt" autocomplete="off" autofocus placeholder="...">
            </div>

        </div>

    </div>
    <script>
        const promptInput = document.getElementById("terminalPrompt");
        const displayGrid = document.getElementById("outputDisplay");
        const chassis = document.getElementById("chassisWrapper");
        const promptSymbol = document.getElementById("promptSymbol");

        // Keep system focus locked onto command string input box on viewport click
        window.addEventListener("click", () => promptInput.focus());

        promptInput.addEventListener("keydown", function(e) {
            if (e.key === "Enter") {
                const commandText = promptInput.value.trim();
                promptInput.value = "";
                if (commandText) {
                    processDatabaseQuery(commandText);
                }
            }
        });

        // Optimized printer: Zero spacing gap, no forced trailing linebreaks or timestamp block strings
        function logToMonitor(sender, text, isAlert = false) {
            const entry = document.createElement("div");
            entry.className = "log-entry";
            if (isAlert) entry.classList.add("alert-text");
            
            entry.innerHTML = `<span class="system-prefix">${sender}:</span>${text}`;
            
            displayGrid.appendChild(entry);
            displayGrid.scrollTop = displayGrid.scrollHeight; // Auto-scrolling grid focus
        }

        // --- CUSTOM FILTER CONTROLLER PROCESSOR MATRIX ---
        function processDatabaseQuery(rawInput) {
            const cleanInput = rawInput.toLowerCase().trim();
            
            logToMonitor("USER", `<span class="accent-text">${rawInput}</span>`);

            // Flush temporary theme states unless target matching consecutive executions
            if (cleanInput !== "friends" && cleanInput !== "bill cipher") {
                document.body.style.backgroundColor = "#ffffff"; // Restores whiteout canvas standard
                chassis.className = "tv-container";
                promptSymbol.innerText = "SYS:>";
                promptSymbol.style.color = "#9bf00b";
            }
            switch (cleanInput) {
                
                case "help":
                    logToMonitor("SYSTEM", "Baseline configurations: <span class='accent-text'>about</span>, <span class='accent-text'>clear</span>, <span class='accent-text'>directory</span>, <span class='accent-text'>exit</span>. Use system keys to fetch logs.");
                    break;

                case "clear":
                    displayGrid.innerHTML = "";
                    logToMonitor("SYSTEM", "Display pipeline log memory cleared.");
                    break;

                case "directory":
                    logToMonitor("SYSTEM", "Ecosystem subfolders mapped on host device:<br>• /limejuice/<br>• /clamshell/<br>• /J.A.R.V.I.S/<br>• /fallingrocks/");
                    break;

                case "about":
                    logToMonitor("SYSTEM", "Project Lime Legislative Mainframe v2.5. Programmed and styled by <span class='accent-text'>[[wazooks]]</span>.");
                    break;

                case "exit":
                    logToMonitor("SYSTEM", "Closing secure database link... Dropping server core.");
                    setTimeout(() => { window.location.href = "../"; }, 1200);
                    break;
                case "jack":
                case "captain jack":
                case "jack sparrow":
                    logToMonitor("PIRATE_LOG", "Internal coordinate vector alignment locked. <span class='accent-text'>'Wherever we want to go, we go. That's what a ship is, you know.'</span> Warning: This console does not point north.");
                    break;

                case "america":
                    logToMonitor("SYS_USA", "Data register loaded. Stars and stripes network handshake complete. Operational freedom: 100%.");
                    break;

                case "chug jug":
                case "chugjug":
                    logToMonitor("ITEM_DROP", "Shield capacity restored to 100. <span class='accent-text'>'I'd really love to chug jug with you.'</span> Protocol wrapped.");
                    break;

                case "xbox":
                    logToMonitor("CONSOLE", "Green ambient diagnostic lit. Network state: Xbox Network Online. Achievement Unlocked: Terminal Discovery.");
                    break;

                case "fortnite":
                    logToMonitor("BATTLE_BUS", "Dropping into coordinate array matrix. <span class='accent-text'>Storm eye shrinking in 0:30.</span> Keep your blueprints ready.");
                    break;

                case "friends":
                    document.body.style.backgroundColor = "#120a1a"; // Monica's apartment dark purple background swap
                    chassis.className = "tv-container friends-theme";
                    promptSymbol.innerText = "PERK:>"; 
                    logToMonitor("TV_NETWORK", "Broadcasting sitcom array feed. <span class='accent-text'>'I'll be there for you (When the rain starts to pour)'</span>. Enter another query to clear tube channels.");
                    break;

                case "bill cipher":
                case "billcipher":
                    document.body.style.backgroundColor = "#1c0404"; // Blood red warning overlay
                    promptSymbol.innerText = "WEIRD_MAGEDDON:> ";
                    promptSymbol.style.color = "#ff3333";
                    logToMonitor("⚠️_MINDSCAPE", "<span class='alert-text'>THE UNIVERSE IS A HOLOGRAM, REALITY IS AN ILLUSION! BUY GOLD, BYE!</span> He is inside the core processor mainframe files.", true);
                    break;

                case "github":
                    logToMonitor("OCTOCAT", "Main repository synchronized. Committing updates to parent main matrix branch folder.");
                    break;

                case "king":
                    logToMonitor("CROWN_REG", "Royalty validation register online. Uneasy lies the head that holds the cryptographic access key.");
                    break;
                case "wazooks":
                    logToMonitor("MAINFRAME", "Identity confirmed: System Creator. All console permissions assigned to level Alpha. Welcome back, chief.");
                    break;

                case "lime juice":
                case "limejuice":
                    logToMonitor("CORE_UI", "UI compiler flag verified: <span class='accent-text'>'Technically, lime juice built the ui for its parent project lol'</span>.");
                    break;

                case "prj lime":
                case "prjlime":
                    logToMonitor("ROOT_HUB", "System status check: Operational. Root architecture stable across all core asset directories.");
                    break;

                case "fiddler's green":
                case "fiddlers green":
                    logToMonitor("SEAFARER", "Parsing old sailors logs... Fiddler's Green location pinpointed. <span class='accent-text'>Where drinking horns overflow and musicians play eternal sets.</span>");
                    break;

                case "jarvis":
                case "j.a.r.v.i.s":
                    logToMonitor("AI_REPLY", "Bypassing server firewalls. Embedded Butler script intercepted: <span class='accent-text'>JARVIS: 'More alcohol, sir?'</span>");
                    break;

                case "fallingrocks":
                case "falling rocks":
                    logToMonitor("PHYSICS_LOG", "Canvas sandbox directory validated. Hidden execution listener caught inside memory index. <span class='accent-text'>System Override Command: Key[E] active.</span>");
                    break;

                case "clamshell":
                    logToMonitor("AUDIO_GRID", "Band asset array synchronized. Musical subsidiary connection established.");
                    break;

                case "god's green earth":
                case "gods green earth":
                    logToMonitor("MAINFRAME", "<span class='gold-text'>'As long as I'm on God's green earth, I will keep writing single-file scripts.'</span> Pipeline compilation locked.");
                    break;
                case "yhwh":
                    logToMonitor("ALPHA_OMEGA", "<span class='gold-text'>I AM THAT I AM. The foundational database architecture that outlasts the network loop.</span>");
                    break;

                case "muhammad":
                    logToMonitor("FAITH_LOG", "Ecosystem peace array active. Final prophet register recognized inside the mainframe historical records.");
                    break;

                case "forever":
                case "never":
                    logToMonitor("TIMELINE", "Loop constraint engaged. Absolute infinite loop validation. Time array bounds disabled.");
                    break;

                case "love":
                    logToMonitor("CORE_LOG", "Heartbeat monitoring framework active. Parameter status: Crucial core function discovered.");
                    break;

                case "hulu":
                case "disney":
                    logToMonitor("STREAM_NET", "Buffering pipeline channels... Media subsidiary package authenticated. Sit back and watch the screen.");
                    break;

                case "lemons":
                case "limes":
                case "citrus":
                    logToMonitor("FRUIT_UI", "Acidic engine ratios balanced. High concentration juice supply loaded directly into the main UI wrappers.");
                    break;

                case "sprite":
                    logToMonitor("SODA_CORE", "Lemon-lime carbonation trigger deployed. Refreshment protocol fully initialized inside the legislative mainframe.");
                    break;

                case "coke":
                case "cocacola":
                case "cola":
                case "pepsi":
                    logToMonitor("BEVERAGE", "Classic dark formula compilation complete. Cool ambient storage database parameters checked.");
                    break;

                case "beer":
                case "whiskey":
                    logToMonitor("STARK_BAR", "JARVIS automated dispensing valve unlocked. Refilling Tony's whiskey decanter now, Sir.");
                    break;
                case "silksong":
                case "hollow knight":
                    logToMonitor("Pharloom_BUG", "<span style='color: #ff4a4a; text-shadow: 0 0 8px rgba(255, 74, 74, 0.4);'>'No cost too great.'</span> Silk strings weaving through the deep nests. Database entry tracking: Still pending... waiting...");
                    break;

                case "bees knees":
                case "beesknees":
                    logToMonitor("EXCELLENT", "Status report: Absolutely top-tier choice string. The ultimate 1920s verification token.");
                    break;

                case "tiktok":
                    logToMonitor("ALGORITHM", "Vertical scrolling loop sequence forced. Attention span limits restricted to 15 seconds. Keep scrolling.");
                    break;

                case "og":
                    logToMonitor("LEGACY", "Respect protocols updated. Original template files validated. Retro framework recognized.");
                    break;

                case "caveman":
                    logToMonitor("OOG_BOOG", "UNGA BUNGA. CRASH ROCKS TOGETHER. DISCOVER CODE FIRE. SYSTEM SMASH.");
                    break;

                case "stark industries":
                case "starkindustries":
                    logToMonitor("MALIBU_CORE", "Stark Industries secure defense server. Arc reactor output: Stable. Welcome back to the main lab, Sir.");
                    break;

                case "terminal":
                    logToMonitor("CLI_EMU", "C:\\> ECHO INTERFACE SIMULATION ENABLED. DIRECT ROOT REPOSITORIES ACCESSIBLE via MAIN COMMAND CONSOLE.");
                    break;

                case "megamind":
                    logToMonitor("METRO_CITY", "Presentation protocol checked. <span class='accent-text'>'The difference between a villain and a super villain is PRESENTATION!'</span> Blue mindscape layout loaded.");
                    break;

                case "hoist the colors":
                case "hoist the colours":
                    logToMonitor("🏴‍☠️_BRETHREN", "<span class='accent-text'>'The King and his men stole the Queen from her bed...'</span> Hoist the colors high. A pirate court assembly has been requested.");
                    break;
                case "gacha":
                case "genshin impact":
                case "genshin":
                    logToMonitor("PITY_COUNT", "Primogem repository spent. Wishing array activated... 5-star character dropped. 50/50 state: Failed.");
                    break;

                case "battle":
                case "witch's duel":
                case "witchs duel":
                    logToMonitor("BOILING_ISLES", "Spell circles expanding. Magic duel sequence initialized. Prepare your glyph scripts immediately.");
                    break;

                case "amity":
                case "luz":
                    logToMonitor("OWL_HOUSE", "Lumity relationship index: 100% stable. Good witch Azura book volume nodes successfully backed up to memory.");
                    break;

                case "kinger":
                case "pomni":
                case "jax":
                    logToMonitor("DIGITAL_CIRCUS", "Exit door search function failed. Abstraction warning metrics tracked. Keep your headset strapped on tight.");
                    break;

                case "minecraft":
                    logToMonitor("VOXEL_GRID", "Generating biome matrix... Seed confirmed. Diamond ore discovered at coordinate row depth level Y=-58.");
                    break;

                case "angelica":
                    logToMonitor("PIRATE_LORE", "Searching Queen Anne's Revenge logs... Angelica Teach's voodoo deck manipulation triggers located.");
                    break;

                case "blackbeard":
                    logToMonitor("EDWARD_TEACH", "Smokey fuses lit inside the beard. Triton's sword array synced. The tide is turning, mates.");
                    break;
                case "idk":
                case "idc":
                    logToMonitor("LAZY_LOG", "System comprehension fallback option called. Shrugging framework instantiated: ¯\\_(ツ)_/¯");
                    break;

                case "lol":
                case "lmao":
                case "lmfao":
                    logToMonitor("SYS_LAUGH", "Chuckle buffers overflowed. Humor array matrices fully registered by legislative interface compiler.");
                    break;

                case "bro":
                    logToMonitor("FRAT_PROTOCOL", "Bro register checked. Unbreakable brotherhood link established between user and compiler logic workspace.");
                    break;

                default:
                    // Shakes and flashes the console screen red to symbolize transmission bugs
                    chassis.classList.add("glitch-flash");
                    setTimeout(() => { chassis.classList.remove("glitch-flash"); }, 300);
                    logToMonitor("STATIC_RECEPTION", `Signal frequency <span class="alert-text">"${rawInput}"</span> dead or unmapped on this channel. Check configuration dials.`, true);
                    break;
            }
        }
    </script>
</body>
</html>
